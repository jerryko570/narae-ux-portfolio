name: Gemini Code Review

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get diff
        run: git diff origin/${{ github.base_ref }}...HEAD > diff.txt

      - name: Run Gemini PR Review
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          DIFF=$(cat diff.txt)
          PAYLOAD=$(jq -n --arg diff "Review this PR diff and write in Korean:\n$DIFF" \
            '{"contents":[{"parts":[{"text":$diff}]}]}')
          curl -s "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=$GEMINI_API_KEY" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            > response.json

      - name: Debug response
        run: cat response.json

      - name: Post comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          jq -r '.candidates[0].content.parts[0].text' response.json > comment.txt
          gh pr comment ${{ github.event.pull_request.number }} --body-file comment.txt

name: Gemini Code Review

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gemini Code Review
        uses: google-github-actions/gemini-code-review@v1
        with:
          gemini_api_key: ${{ secrets.GEMINI_API_KEY }}
